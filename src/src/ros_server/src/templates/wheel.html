<head>

    <style>
        button {

            color: white;

            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 50%;
        }

        button.up {
            background-color: #008CBA;
        }

        button.back {
            background-color: #f44336;
        }

        button.left {
            background-color: #FFD700;
        }

        button.right {

        }

        button.stop {
            background-color: #f44336;
        }
    </style>

            <div class="movement text-center">

                    </div>
                    <div class="col">

                    </div>
                    <div class="col " style="text-align:left ;">

                <button class="back" onclick="backward()">BACKWARD</button>
            </div>
        <div id="output"></div>
    </div>
