<!DOCTYPE html>
<html>

<head>
    <title>Real-time Inputs- Servo</title>
    <style>
        .slider {
            width: 20%;
            height: 15px;
            border-radius: 5px;
            background: #d3d3d3;
            outline: none;
            opacity: 0.7;
            -webkit-transition: .2s;
            transition: opacity .2s;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #04AA6D;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #04AA6D;
            cursor: pointer;
        }
    </style>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>  

</head>

<body>
        <label for="input1">Head</label>
        <div class="container slidecontainer">
            0<input type="range" min="0" max="420" value="50" class="slider" id="head">180
            <p>Value: <span id="demo"></span></p>
        </div>
        <br><br>
        <label for="input1">Left Hand</label>
        <div class="container slidecontainer">
            0<input type="range" min="0" max="420" value="50" class="slider" id="left">180
            <p>Value: <span id="demo"></span></p>
        </div>
        <br><br>
        <label for="input1">right Hand</label>
        <div class="container slidecontainer">
            0<input type="range" min="0" max="420" value="50" class="slider" id="right">180
            <p>Value: <span id="demo"></span></p>
        </div>

    <div id="output1"></div>
    <div>
        <br>
        <button onclick="location.href='index.html'">Go Back</button>
        <br>
    </div>

    <script>
        $(document).ready(function() {
          // Update range value on slider change
          $('#head').change(function() {
            var value = $(this).val();
            // $('#rangeValue').text(value);
      
            // Send value to server using AJAX
            $.ajax({
                url: "{%url 'head'%}", 
                data:{
                    command:value
                },
              success: function(response) {
                console.log(response);
              },
              error: function(error) {
                console.log(error);
              }
            });
          });

          $('#left').change(function() {
            var value = $(this).val();
            // $('#rangeValue').text(value);
      
            // Send value to server using AJAX
            $.ajax({
                url: "{%url 'left'%}", 
                data:{
                    command:value
                },
              success: function(response) {
                console.log(response);
              },
              error: function(error) {
                console.log(error);
              }
            });
          });

          $('#right').change(function() {
            var value = $(this).val();
            // $('#rangeValue').text(value);
      
            // Send value to server using AJAX
            $.ajax({
                url: "{%url 'right'%}", 
                data:{
                    command:value
                },
              success: function(response) {
                console.log(response);
              },
              error: function(error) {
                console.log(error);
              }
            });
          });
        });
      </script>


</body>

</html>
