<!DOCTYPE html>
<html>
<head>
    <title>Button Example</title>
    <style>
        .button-group {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
      }
      
      .button-group button {
        padding: 10px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      
      .button-group button:hover {
        background-color: #3e8e41;
      }
    </style>
    
      
</head>
<body>
    <div class="button-group">
    <a href="{%url 'wheel'%}">Wheels</a>
    <br>
    <a href="{%url 'servo'%}">Servo</a>
    <br>
    <br>
